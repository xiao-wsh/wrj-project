<!DOCTYPE html> <!-- 声明文档类型为 HTML5，告诉浏览器按标准模式渲染 -->
<!-- 无人机静态详情示例页（演示模板，字段需与后端实体一致方可直接使用） -->
<html lang="zh-CN"> <!-- 页面根元素，lang="zh-CN" 表示页面语言为简体中文，利于搜索引擎和屏幕阅读器 -->
<!-- 页面头部：设置编码、标题、引入样式等，用户看不到 -->
<head> <!-- head 标签开始：包含页面的元数据（不会直接显示在页面上） -->
    <!-- 设置页面字符编码为UTF-8，防止中文乱码 -->
    <meta charset="UTF-8"> <!-- meta 元标签；charset="UTF-8" 告诉浏览器用 UTF-8 编码解析页面内容 -->
    <!-- 浏览器标签页显示的标题 -->
    <title>无人机详情</title> <!-- 页面标题：显示在浏览器标签页上的文字 -->
    <!-- 引入第三方Bootstrap前端样式库，让页面更美观 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css"> <!-- 引入 Bootstrap 3.3.7 CSS 文件，从 CDN 加载无需本地文件 -->
</head> <!-- head 标签结束 -->

<!-- 页面主体内容：用户能看到的所有内容都在这里 -->
<body> <!-- body 标签开始：页面可见内容的容器 -->
<!-- 容器：控制页面整体宽度，居中显示 -->
<div class="container" style="margin-top: 50px;"> <!-- container 是 Bootstrap 的固定宽度容器；style 内联样式：顶部留 50px 空白 -->
    <!-- 面板组件：蓝色主题的信息展示框 -->
    <div class="panel panel-primary"> <!-- Bootstrap 面板组件；panel-primary 给面板蓝色主题边框 -->
        <!-- 面板头部：标题区域 -->
        <div class="panel-heading"> <!-- 面板头部区域，Bootstrap 会给它灰色背景 -->
            <h3 class="panel-title">无人机详情信息</h3> <!-- h3 三级标题，panel-title 是 Bootstrap 面板标题专用样式 -->
        </div> <!-- 面板头部结束 -->
        <!-- 面板主体：展示无人机详细数据 -->
        <div class="panel-body"> <!-- 面板内容区域，用于放置具体数据 -->
            <!-- 无人机编码：从后端传递的drone对象中获取drone_code字段 -->
            <h4>无人机编码：[[${drone.drone_code}]]</h4> <!-- Thymeleaf 内联表达式 [[${...}]] 直接输出变量值 -->
            <!-- 无人机名称：从后端获取name字段 -->
            <h4>无人机名称：[[${drone.name}]]</h4> <!-- 显示 drone 对象的 name 属性 -->
            <!-- 无人机型号：从后端获取model字段 -->
            <h4>无人机型号：[[${drone.model}]]</h4> <!-- 显示 drone 对象的 model 属性 -->
            <!-- 生产厂商：从后端获取manufacturer字段 -->
            <h4>生产厂商：[[${drone.manufacturer}]]</h4> <!-- 显示 drone 对象的 manufacturer 属性 -->
            <!-- 电池电量：从后端获取battery_level字段，显示百分比 -->
            <h4>电池电量：[[${drone.battery_level}]] %</h4> <!-- 显示电池电量百分比，注意这个字段当前数据库表中可能不存在 -->
            <!-- 运行状态：从后端获取status字段 -->
            <h4>运行状态：[[${drone.status}]]</h4> <!-- 显示无人机当前业务状态（如 READY、FLYING） -->
        </div> <!-- 面板主体结束 -->
    </div> <!-- 面板结束 -->
    <!-- 返回列表按钮：点击跳转到无人机列表页 -->
    <a href="/drones" class="btn btn-default">返回列表</a> <!-- a 标签链接；btn btn-default 是 Bootstrap 的默认按钮样式 -->
</div> <!-- 容器结束 -->
</body> <!-- body 标签结束 -->
</html> <!-- html 根元素结束 -->
